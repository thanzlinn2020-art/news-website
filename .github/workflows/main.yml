name: MYANMAR GLOBAL INSIGHT Automation
on:
  repository_dispatch:
    types: [update_news]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install @azure-rest/ai-inference @azure/core-auth
      - name: Build Website with GPT-5
        run: node agent.js
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          NEWS_HEADLINE: ${{ github.event.client_payload.headline }}
      - name: Commit and Push index.html
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Update news content" || exit 0
          git push origin main
