name: MYANMAR GLOBAL INSIGHT Automation
on:
  repository_dispatch:
    types: [update_news] # Telegram မှ လှမ်းခေါ်မည့် Signal

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build Website with GPT-5
        run: node agent.js
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          NEWS_HEADLINE: ${{ github.event.client_payload.headline }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
