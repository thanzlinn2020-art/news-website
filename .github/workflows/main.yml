name: MYANMAR GLOBAL INSIGHT Automation
on:
  repository_dispatch:
    types: [update_news]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install @azure-rest/ai-inference @azure/core-auth axios
        
      - name: Build Website with DeepSeek
        run: node agent.js
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          NEWS_HEADLINE: ${{ github.event.client_payload.headline || 'ယနေ့ နောက်ဆုံးရ သတင်းများ' }}
          
      - name: Commit and Push index.html
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "Update content with DeepSeek" || exit 0
          git push origin main
