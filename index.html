<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
    <h1 class="text-xl font-bold text-gray-800 text-center mb-4">ကိုယ်အလေးချိန်စာရင်းများ (BMI Calculator)</h1>
    <form id="bmiForm" class="space-y-4">
      <div>
        <label for="weight" class="block text-gray-700 font-medium mb-2">ကိုယ်အလေးချိန် (ကီလိုမီတာ)</label>
        <input type="number" id="weight" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="ဥပမာ: 65" min="0" step="0.1" required>
      </div>
      <div>
        <label for="height" class="block text-gray-700 font-medium mb-2">အရပ်အမြင့် (မီတာ)</label>
        <input type="number" id="height" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="ဥပမာ: 1.75" min="0" step="0.01" required>
      </div>
      <button type="button" id="calculateButton" class="w-full bg-blue-500 text-white font-medium py-2 px-4 rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500">တွက်ချက်ပါ</button>
    </form>
    <div id="result" class="mt-6 text-center hidden">
      <p class="text-lg font-bold text-gray-700">သင့်ရဲ့ BMI: <span id="bmiValue" class="text-blue-500"></span></p>
      <p id="bmiCategory" class="text-gray-700"></p>
    </div>
  </div>

  <script>
    document.getElementById('calculateButton').addEventListener('click', function () {
      const weight = parseFloat(document.getElementById("weight").value);
      const height = parseFloat(document.getElementById("height").value);
      const resultDiv = document.getElementById("result");
      const bmiValueSpan = document.getElementById("bmiValue");
      const bmiCategoryP = document.getElementById("bmiCategory");

      if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
        resultDiv.classList.add('hidden');
        alert("ကျေးဇူးပြု၍ စာရင်းများ မှန်ကန်စွာ ဖြည့်ပါ။");
        return;
      }

      const bmi = (weight / (height * height)).toFixed(1);
      let category = "";

      if (bmi < 18.5) {
        category = "အလွန်ပုတ်ပါးပါသည်။";
      } else if (bmi >= 18.5 && bmi <= 24.9) {
        category = "သင့်တော်သော ကိုယ်အလေးချိန်ဖြစ်ပါသည်။";
      } else if (bmi >= 25 && bmi <= 29.9) {
        category = "အနည်းငယ်ပိုသည်။";
      } else {
        category = "အလွန်ပိုသည်။";
      }

      bmiValueSpan.textContent = bmi;
      bmiCategoryP.textContent = category;
      resultDiv.classList.remove('hidden');
    });
  </script>
</body>
</html>
