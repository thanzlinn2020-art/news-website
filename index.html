<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာသတင်းပေးပို့စက်</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-hidden {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <div class="max-w-6xl mx-auto p-4">
        <header class="flex justify-between items-center py-6">
            <h1 class="text-2xl font-bold text-gray-800">မြန်မာသတင်း</h1>
            <button id="adminBtn" class="bg-blue-500 text-white px-4 py-2 rounded shadow hover:bg-blue-600">Admin Dashboard</button>
        </header>

        <main>
            <section id="news-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- News items will be dynamically injected here -->
            </section>
        </main>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="modal-hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
        <div class="bg-white rounded-lg shadow-lg max-w-sm w-full p-6">
            <h2 class="text-lg font-bold mb-4">သတင်းတိုး/ဖျက်</h2>
            <form id="newsForm" class="mb-4">
                <div class="mb-4">
                    <label for="newsTitle" class="block text-sm font-medium">ခေါင်းစဉ်</label>
                    <input type="text" id="newsTitle" class="w-full px-4 py-2 border rounded-lg" required>
                </div>
                <div class="mb-4">
                    <label for="newsContent" class="block text-sm font-medium">ပထွေး</label>
                    <textarea id="newsContent" class="w-full px-4 py-2 border rounded-lg" rows="4" required></textarea>
                </div>
                <button type="submit" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">ထည့်ရန်</button>
            </form>
            <button id="closeModal" class="text-gray-500 hover:text-gray-700">ပိတ်ရန်</button>
        </div>
    </div>

    <script>
        const adminBtn = document.getElementById('adminBtn');
        const adminModal = document.getElementById('adminModal');
        const closeModal = document.getElementById('closeModal');
        const newsForm = document.getElementById('newsForm');
        const newsList = document.getElementById('news-list');

        function renderNews() {
            const newsData = JSON.parse(localStorage.getItem('newsData')) || [];
            newsList.innerHTML = '';
            newsData.forEach((news, index) => {
                const newsItem = document.createElement('div');
                newsItem.classList = 'bg-white rounded-lg shadow p-4 flex flex-col';
                newsItem.innerHTML = `
                    <img src="https://images.unsplash.com/photo-1585829365234-78d9b8129f50?w=800" alt="Placeholder image" class="mb-4 rounded">
                    <h3 class="text-lg font-bold mb-2">${news.title}</h3>
                    <p class="text-sm text-gray-700 mb-4">${news.content}</p>
                    <button data-index="${index}" class="deleteNews bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">ဖျက်ရန်</button>
                `;
                newsList.appendChild(newsItem);
            });
        }

        adminBtn.addEventListener('click', () => {
            adminModal.classList.remove('modal-hidden');
        });

        closeModal.addEventListener('click', () => {
            adminModal.classList.add('modal-hidden');
        });

        newsForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newsTitle = document.getElementById('newsTitle').value.trim();
            const newsContent = document.getElementById('newsContent').value.trim();

            if (newsTitle && newsContent) {
                const currentNews = JSON.parse(localStorage.getItem('newsData')) || [];
                currentNews.push({ title: newsTitle, content: newsContent });
                localStorage.setItem('newsData', JSON.stringify(currentNews));
                renderNews();
                newsForm.reset();
                adminModal.classList.add('modal-hidden');
            }
        });

        newsList.addEventListener('click', (e) => {
            if (e.target.classList.contains('deleteNews')) {
                const index = e.target.getAttribute('data-index');
                const currentNews = JSON.parse(localStorage.getItem('newsData')) || [];
                currentNews.splice(index, 1);
                localStorage.setItem('newsData', JSON.stringify(currentNews));
                renderNews();
            }
        });

        window.addEventListener('load', renderNews);
    </script>
</body>
</html>
