<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC Burmese Clone</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background-color: #B80000;
            color: white;
            padding: 10px 15px;
            text-align: center;
            font-size: 1.5em;
        }
        main {
            padding: 15px;
        }
        .hero {
            margin-bottom: 20px;
        }
        .hero img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .story {
            margin: 15px 0;
            display: flex;
            align-items: flex-start;
        }
        .story img {
            width: 100px;
            height: 80px;
            object-fit: cover;
            margin-right: 10px;
            border-radius: 8px;
        }
        .hidden {
            display: none;
        }
        .admin-panel {
            background: #f5f5f5;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
        }
        .admin-panel input,
        .admin-panel button {
            margin: 5px 0;
            padding: 10px;
        }
        .admin-toggle {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        NEWS
        <br>
        <small>ဗီြအိုးေအိုင္ ဘား</small>
    </header>
    <main>
        <section id="news-section">
            <div class="hero" id="hero-story">
                <img src="https://via.placeholder.com/800x400" alt="Hero Story">
                <h2 id="hero-title">Hero Story Title</h2>
                <p id="hero-desc">Hero story description goes here...</p>
            </div>
            <div id="news-list">
                <!-- List of news will be populated here -->
            </div>
        </section>

        <button id="admin-access" class="hidden">Admin</button>
        <div id="admin-panel" class="hidden admin-panel">
            <h3>Admin Panel</h3>
            <label>
                Title:
                <input id="news-title" type="text">
            </label>
            <label>
                Description:
                <input id="news-desc" type="text">
            </label>
            <label>
                Thumbnail URL:
                <input id="news-thumbnail" type="text">
            </label>
            <button id="add-news">Add News</button>
            <button id="fetch-latest">Fetch Latest</button>
        </div>
    </main>
    
    <script>
        let newsData = JSON.parse(localStorage.getItem('newsData')) || [
            { 
                title: "Sample Story 1", 
                description: "Description for Sample Story 1.", 
                thumbnail: "https://via.placeholder.com/100"
            }, 
            {
                title: "Sample Story 2", 
                description: "Description for Sample Story 2.", 
                thumbnail: "https://via.placeholder.com/100"
            }
        ];

        function renderNews() {
            const heroStory = newsData[0];
            document.getElementById('hero-title').textContent = heroStory.title;
            document.getElementById('hero-desc').textContent = heroStory.description;

            const newsList = document.getElementById('news-list');
            newsList.innerHTML = '';
            newsData.slice(1).forEach((news, index) => {
                const newsItem = `
                    <div class="story">
                        <img src="${news.thumbnail}" alt="News Thumbnail">
                        <div>
                            <h3>${news.title}</h3>
                            <p>${news.description}</p>
                        </div>
                    </div>`;
                newsList.innerHTML += newsItem;
            });
        }

        document.getElementById('add-news').addEventListener('click', () => {
            const title = document.getElementById('news-title').value;
            const desc = document.getElementById('news-desc').value;
            const thumbnail = document.getElementById('news-thumbnail').value;

            if (title && desc && thumbnail) {
                newsData.unshift({ title, description: desc, thumbnail });
                localStorage.setItem('newsData', JSON.stringify(newsData));
                renderNews();
            }
        });

        document.getElementById('fetch-latest').addEventListener('click', () => {
            alert("Fetching the latest news... Placeholder functionality.");
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'A' && e.ctrlKey) {
                const adminPanel = document.getElementById('admin-panel');
                adminPanel.classList.toggle('hidden');
            }
        });

        renderNews();
    </script>
</body>
</html>
