<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ငွေလဲနှုန်းတွက်ချက်တဲ့ App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="p-8 bg-white shadow-lg rounded-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-gray-700 mb-6">ငွေလဲနှုန်းတွက်ချက်ရန်</h1>
        <form id="currencyForm" class="space-y-4">
            <div>
                <label for="amount" class="block text-sm font-medium text-gray-700">ငွေပမာဏ</label>
                <input type="number" id="amount" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="ငွေပမာဏထည့်ရန်">
            </div>
            <div>
                <label for="rate" class="block text-sm font-medium text-gray-700">လဲနှုန်း</label>
                <input type="number" id="rate" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="လဲနှုန်းထည့်ရန်">
            </div>
            <div>
                <label for="currency" class="block text-sm font-medium text-gray-700">ငွေအမျိုးအစား</label>
                <select id="currency" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                    <option value="usd">USD ($)</option>
                    <option value="mmk">MMK (Ks)</option>
                </select>
            </div>
            <button type="button" id="calculateButton" class="w-full bg-indigo-500 text-white py-2 rounded-md text-sm font-medium hover:bg-indigo-600 focus:outline-none">တွက်ချက်ရန်</button>
        </form>
        <div id="result" class="mt-5 text-center text-gray-700 text-lg font-medium hidden"></div>
    </div>

    <script>
        const calculateButton = document.getElementById("calculateButton");
        const resultDiv = document.getElementById("result");

        calculateButton.addEventListener("click", () => {
            const amount = parseFloat(document.getElementById("amount").value);
            const rate = parseFloat(document.getElementById("rate").value);
            const currency = document.getElementById("currency").value;

            if (isNaN(amount) || isNaN(rate) || amount <= 0 || rate <= 0) {
                resultDiv.textContent = "သေချာစွာစာရင်းများထည့်ပါ!";
                resultDiv.classList.remove("hidden");
                resultDiv.classList.add("text-red-500");
                return;
            }

            const convertedAmount = amount * rate;
            const formattedCurrency = currency === "usd" ? "$" : "Ks";

            resultDiv.textContent = `ပေါ်လာသောအရေအတွက်: ${convertedAmount.toFixed(2)} ${formattedCurrency}`;
            resultDiv.classList.remove("hidden");
            resultDiv.classList.remove("text-red-500");
        });
    </script>
</body>
</html>
